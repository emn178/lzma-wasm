<!DOCTYPE html>

<body>
  <h1>测试 &lt;script&gt; 版本</h1>
  <script src="../node_modules/@emn178/lzma-wasm/dist/iife/index.js"></script>
  <script src="./core.js"></script>
  <script>
    const { initWasm, compress, decompress, decompressToBuffer } = window.LzmaWasm;
    const tag = "< script src='...'>";
    const pass = run(tag, initWasm, compress, decompress);
    if(pass){
      document.body.insertAdjacentHTML("beforeend", `<p style="color: green;"> 载入 ${tag} 测试通过！</p>`);
      bench(tag, initWasm, compress, decompress, decompressToBuffer)
    } else {
      document.body.insertAdjacentHTML("beforeend", `<p style="color: red;"> 载入 ${tag} 测试失败！</p>`);
    }
  </script>
</body>

</html>
